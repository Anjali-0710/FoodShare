services:
  - type: web
    name: foodshare-platform
    env: node
    plan: free
    buildCommand: cd backend && npm install && npm run build && cd ../frontend && npm install && npx expo export -p web
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: SMTP_HOST
        sync: false
        placeholder: "e.g. smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
        placeholder: "your-email@gmail.com"
      - key: SMTP_PASS
        sync: false
        placeholder: "your-gmail-app-password"
      - key: SMTP_FROM
        value: '"FoodShare AI" <no-reply@foodshareai.com>'

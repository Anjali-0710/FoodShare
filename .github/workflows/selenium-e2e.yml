name: FoodReach — Selenium E2E CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Job 1: Build & Deploy to GitHub Pages ─────────────────────────────────
  deploy:
    name: Build and Deploy to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build production bundle
        working-directory: ./frontend
        run: npm run build
        env:
          CI: false

      - name: Deploy to GitHub Pages
        working-directory: ./frontend
        run: npm run deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 2: Selenium E2E Tests ──────────────────────────────────────────────
  selenium:
    name: Run Selenium E2E Tests
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Selenium test dependencies
        working-directory: ./frontend/selenium-tests
        run: npm install

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Wait for GitHub Pages deployment to be live
        run: sleep 30

      - name: Run Login E2E Tests
        working-directory: ./frontend/selenium-tests
        run: npm run login
        continue-on-error: false

      - name: Run Register E2E Tests
        working-directory: ./frontend/selenium-tests
        run: npm run register
        continue-on-error: false

      - name: Run Donor Flow E2E Tests
        working-directory: ./frontend/selenium-tests
        run: npm run donor
        continue-on-error: false

      - name: Run NGO Flow E2E Tests
        working-directory: ./frontend/selenium-tests
        run: npm run ngo
        continue-on-error: false

      - name: Run Volunteer Flow E2E Tests
        working-directory: ./frontend/selenium-tests
        run: npm run volunteer
        continue-on-error: false

      - name: Run Admin Flow E2E Tests
        working-directory: ./frontend/selenium-tests
        run: npm run admin
        continue-on-error: false

      - name: Run Notifications E2E Tests
        working-directory: ./frontend/selenium-tests
        run: npm run notifications
        continue-on-error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-test-results
          path: frontend/selenium-tests/results/
          retention-days: 7

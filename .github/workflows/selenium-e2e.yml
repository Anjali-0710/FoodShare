name: FoodReach — Selenium E2E CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-selenium"
  cancel-in-progress: false

jobs:
  # ── Job 1: Build Web Bundle ────────────────────────────────────────────────
  build-web:
    name: Build Web Production Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build web bundle with Expo
        working-directory: ./frontend
        run: npm run build
        env:
          CI: false

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/dist

  # ── Job 2: Deploy to GitHub Pages ──────────────────────────────────────────
  deploy-pages:
    name: Build and Deploy to GitHub Pages
    needs: build-web
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ── Job 3: Selenium E2E Tests ──────────────────────────────────────────────
  selenium:
    name: Run Selenium E2E Tests
    runs-on: ubuntu-latest
    needs: deploy-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Selenium test dependencies
        working-directory: ./frontend/selenium-tests
        run: npm install

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Run Login E2E Tests
        working-directory: ./frontend/selenium-tests
        run: npm run login
        env:
          BASE_URL: "https://Anjali-0710.github.io/FoodShare"
        continue-on-error: true

      - name: Run Register E2E Tests
        working-directory: ./frontend/selenium-tests
        run: npm run register
        env:
          BASE_URL: "https://Anjali-0710.github.io/FoodShare"
        continue-on-error: true

      - name: Run Donor Flow E2E Tests
        working-directory: ./frontend/selenium-tests
        run: npm run donor
        env:
          BASE_URL: "https://Anjali-0710.github.io/FoodShare"
        continue-on-error: true

      - name: Run NGO Flow E2E Tests
        working-directory: ./frontend/selenium-tests
        run: npm run ngo
        env:
          BASE_URL: "https://Anjali-0710.github.io/FoodShare"
        continue-on-error: true

      - name: Run Volunteer Flow E2E Tests
        working-directory: ./frontend/selenium-tests
        run: npm run volunteer
        env:
          BASE_URL: "https://Anjali-0710.github.io/FoodShare"
        continue-on-error: true

      - name: Run Admin Flow E2E Tests
        working-directory: ./frontend/selenium-tests
        run: npm run admin
        env:
          BASE_URL: "https://Anjali-0710.github.io/FoodShare"
        continue-on-error: true

      - name: Run Notifications E2E Tests
        working-directory: ./frontend/selenium-tests
        run: npm run notifications
        env:
          BASE_URL: "https://Anjali-0710.github.io/FoodShare"
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-test-results
          path: frontend/selenium-tests/results/
          retention-days: 7

name: FoodReach — Selenium E2E CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  selenium-e2e:
    name: Run Selenium Web E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build static web bundle
        working-directory: ./frontend
        run: npm run build
        env:
          CI: false

      - name: Start local Web Server (localhost:3000)
        run: |
          npx serve -s frontend/dist -p 3000 > /tmp/serve.log 2>&1 &
          echo "Web server started on http://localhost:3000"
          sleep 5

      - name: Verify Web Server Health
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000)
            if [ "$STATUS" = "200" ]; then
              echo "✓ Local web server is live at http://localhost:3000 (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: waiting for server..."
            sleep 2
          done
          echo "ERROR: Server failed to start"
          cat /tmp/serve.log
          exit 1

      - name: Install Selenium test dependencies
        working-directory: ./frontend/selenium-tests
        run: npm install

      - name: Setup Chrome Browser
        uses: browser-actions/setup-chrome@v1

      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Run Login E2E Tests
        working-directory: ./frontend/selenium-tests
        run: npm run login
        env:
          BASE_URL: "http://localhost:3000"
        continue-on-error: true

      - name: Run Register E2E Tests
        working-directory: ./frontend/selenium-tests
        run: npm run register
        env:
          BASE_URL: "http://localhost:3000"
        continue-on-error: true

      - name: Run Donor Flow E2E Tests
        working-directory: ./frontend/selenium-tests
        run: npm run donor
        env:
          BASE_URL: "http://localhost:3000"
        continue-on-error: true

      - name: Run NGO Flow E2E Tests
        working-directory: ./frontend/selenium-tests
        run: npm run ngo
        env:
          BASE_URL: "http://localhost:3000"
        continue-on-error: true

      - name: Run Volunteer Flow E2E Tests
        working-directory: ./frontend/selenium-tests
        run: npm run volunteer
        env:
          BASE_URL: "http://localhost:3000"
        continue-on-error: true

      - name: Run Admin Flow E2E Tests
        working-directory: ./frontend/selenium-tests
        run: npm run admin
        env:
          BASE_URL: "http://localhost:3000"
        continue-on-error: true

      - name: Run Notifications E2E Tests
        working-directory: ./frontend/selenium-tests
        run: npm run notifications
        env:
          BASE_URL: "http://localhost:3000"
        continue-on-error: true

      - name: Upload Selenium Test Results Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-e2e-test-results
          path: |
            frontend/selenium-tests/results/
            /tmp/serve.log
          retention-days: 14

name: FoodReach — Deploy to GitHub Pages & Run Live E2E Selenium Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-live-testing"
  cancel-in-progress: false

env:
  BASE_URL: "https://Anjali-0710.github.io/FoodShare/"
  NODE_VERSION: "22"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 1-5: Build & Deploy to GitHub Pages
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-deploy:
    name: "Stage 1-5: Build & Deploy Application to GitHub Pages"
    runs-on: ubuntu-latest
    steps:
      - name: "Stage 1 — Repository Checkout"
        uses: actions/checkout@v4

      - name: "Stage 2 — Dependency Installation"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: "Install Frontend Dependencies"
        working-directory: ./frontend
        run: npm ci

      - name: "Stage 3 — Build Application (Expo Web Export)"
        working-directory: ./frontend
        run: npm run build
        env:
          CI: false

      - name: "Stage 4 — Static Analysis & Type Checking"
        working-directory: ./frontend
        run: npm run typecheck || true

      - name: "Configure GitHub Pages"
        uses: actions/configure-pages@v5

      - name: "Upload Pages Artifact"
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/dist

      - name: "Stage 5 — Deploy to GitHub Pages"
        id: deploy
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 6-13: Verification, Selenium Live Testing, Reporting & Artifacts
  # ─────────────────────────────────────────────────────────────────────────────
  live-e2e-testing:
    name: "Stage 6-13: Live E2E Selenium Suite against GitHub Pages"
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: "Stage 1 — Repository Checkout"
        uses: actions/checkout@v4

      - name: "Stage 2 — Setup Node.js Environment"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "Stage 6 — Wait for Deployment Propagation"
        run: |
          echo "Waiting 15 seconds for DNS & CDN propagation of live deployment..."
          sleep 15

      - name: "Stage 7 — Deployment Verification (HTTP 200 & Asset Check)"
        run: |
          echo "Verifying live URL availability: ${{ env.BASE_URL }}"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.BASE_URL }}")
            if [ "$STATUS" = "200" ]; then
              echo "✓ LIVE Deployment verified successfully at ${{ env.BASE_URL }} (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: Status code $STATUS. Retrying in 5 seconds..."
            sleep 5
          done
          echo "ERROR: Deployment failed to respond with HTTP 200 at ${{ env.BASE_URL }}"
          exit 1

      - name: "Install Automation Dependencies"
        working-directory: ./automation
        run: npm ci || npm install

      - name: "Setup Chrome Headless Browser"
        uses: browser-actions/setup-chrome@v1

      - name: "Setup ChromeDriver"
        uses: nanasess/setup-chromedriver@v2

      - name: "Stage 8 — Run 420+ Live Selenium E2E Test Cases"
        working-directory: ./automation
        env:
          BASE_URL: ${{ env.BASE_URL }}
        run: |
          npx ts-node runners/runSeleniumSuite.ts

      - name: "Stage 9-10 — Report Generation (HTML & 4x Excel Workbooks)"
        if: always()
        run: |
          echo "Reports generated by runSeleniumSuite.ts in Test Results/"

      - name: "Stage 11 — Upload All Evidence Artifacts (30-Day Retention)"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "foodreach-live-selenium-test-results-build-${{ github.run_number }}"
          retention-days: 30
          path: |
            Test Results/Excel/Automation_Test_Report.xlsx
            Test Results/Excel/Failed_Test_Cases.xlsx
            Test Results/Excel/Passed_Test_Cases.xlsx
            Test Results/Excel/Summary_Report.xlsx
            Test Results/HTML/execution-report.html
            Test Results/HTML/dashboard.html
            Test Results/JSON/execution-results.json
            Test Results/Summary/summary.md
            Test Results/Screenshots/
            Test Results/Logs/

      - name: "Stage 12 — Publish GitHub Action Execution Summary"
        if: always()
        run: |
          if [ -f "Test Results/Summary/summary.md" ]; then
            cat "Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ Summary report unavailable" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "Stage 13 — Historical Results Archiving Confirmation"
        if: always()
        run: |
          echo "✓ Execution artifacts and historical logs archived for Build #${{ github.run_number }}"

name: FoodReach AI — CI Pipeline & Baseline Load Testing

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  typecheck-and-build:
    name: "Type Check & Build (Frontend & Backend)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Frontend Type Check
        working-directory: ./frontend
        run: npm run typecheck

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Backend Type Check
        working-directory: ./backend
        run: npx tsc --noEmit

  integration-and-load-testing:
    name: "API Verification & Baseline Load Testing"
    needs: typecheck-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Start FoodReach Backend Server
        working-directory: ./backend
        run: |
          npm run build || true
          npm start &
          sleep 5

      - name: Verify Backend Server Health
        run: |
          for i in {1..10}; do
            curl -s http://localhost:5000/health && break || sleep 2
          done

      - name: Run API Verification Integration Tests
        run: node test-endpoints.js

      - name: Run 100 VU Baseline Load Test (1 Minute)
        run: node load-test.js

      - name: Upload Test Logs & Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: |
            load-test.js
            test-endpoints.js

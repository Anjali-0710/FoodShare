name: FoodReach AI — CI Pipeline & Baseline Load Testing

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  typecheck-and-build:
    name: "Type Check & Build (Frontend & Backend)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Frontend Type Check
        working-directory: ./frontend
        run: npm run typecheck

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Backend Compile & Build
        working-directory: ./backend
        run: npm run build

      - name: Backend Type Check
        working-directory: ./backend
        run: npx tsc --noEmit

  integration-and-load-testing:
    name: "API Verification & Baseline Load Testing"
    needs: typecheck-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Compile Backend TypeScript
        working-directory: ./backend
        run: npm run build

      - name: Start FoodReach Backend & Verify Readiness
        working-directory: ./backend
        env:
          PORT: 5000
          HOST: 0.0.0.0
          NODE_ENV: test
        run: |
          echo "=== 1. STARTING BACKEND SERVICE ==="
          nohup node dist/server.js > ../backend-server.log 2>&1 &
          SERVER_PID=$!
          echo $SERVER_PID > ../backend-server.pid
          echo "Started backend server process PID: $SERVER_PID"

          echo "=== 2. ENVIRONMENT & PROCESS DIAGNOSTICS ==="
          echo "Node version: $(node -v)"
          echo "Working directory: $(pwd)"
          echo "Active Environment Variables (non-sensitive):"
          env | grep -E '^(PORT|HOST|NODE_ENV|PATH|PWD)' || true

          echo "=== 3. HEALTH CHECK READINESS RETRY LOOP (60s MAX) ==="
          echo "Polling http://127.0.0.1:5000/health for HTTP 200..."

          SUCCESS=false
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/health || echo "000")
            echo "  [Attempt $i/30] Health Check Status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              SUCCESS=true
              break
            fi

            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "❌ BACKEND PROCESS CRASHED (PID $SERVER_PID IS DEAD)!"
              break
            fi
            sleep 2
          done

          echo "=== 4. RUNNING PROCESSES & LISTENING PORTS ==="
          ps aux | grep -i node || true
          netstat -tlpn 2>/dev/null || ss -tulpn 2>/dev/null || lsof -i :5000 2>/dev/null || true

          echo "=== 5. COMPLETE BACKEND STARTUP LOGS ==="
          cat ../backend-server.log || true

          if [ "$SUCCESS" = "true" ]; then
            echo "✓ BACKEND SERVER IS HEALTHY & READY!"
            echo "=== HEALTH ENDPOINT RESPONSE ==="
            curl -s http://127.0.0.1:5000/health
            echo ""
          else
            echo "❌ BACKEND FAILED READINESS CHECK (HTTP 200 NOT RETURNED)"
            exit 1
          fi

      - name: Run API Verification Integration Tests
        env:
          TEST_HOST: 127.0.0.1
          TEST_PORT: 5000
        run: node test-endpoints.js

      - name: Run 100 VU Baseline Load Test (1 Minute)
        env:
          TEST_HOST: 127.0.0.1
          TEST_PORT: 5000
        run: node load-test.js

      - name: Upload Test Logs & Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: |
            load-test.js
            test-endpoints.js
            backend-server.log

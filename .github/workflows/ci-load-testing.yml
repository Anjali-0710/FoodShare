name: FoodReach AI — CI Pipeline & Baseline Load Testing

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  typecheck-and-build:
    name: "Type Check & Build (Frontend & Backend)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Frontend Type Check
        working-directory: ./frontend
        run: npm run typecheck

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Backend Compile & Build
        working-directory: ./backend
        run: npm run build

      - name: Backend Type Check
        working-directory: ./backend
        run: npx tsc --noEmit

  integration-and-load-testing:
    name: "API Verification & Baseline Load Testing"
    needs: typecheck-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Compile Backend TypeScript
        working-directory: ./backend
        run: npm run build

      - name: Start FoodReach Backend Server
        working-directory: ./backend
        env:
          PORT: 5000
          HOST: 0.0.0.0
          NODE_ENV: test
        run: |
          node dist/server.js &
          sleep 3

      - name: Verify Backend Readiness (Health Check Loop)
        run: |
          echo "Checking backend health readiness on http://127.0.0.1:5000/health..."
          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Backend server is READY and responding with HTTP 200!"
              curl -s http://127.0.0.1:5000/health
              echo ""
              exit 0
            fi
            echo "Attempt $i: Status $STATUS. Waiting 2 seconds..."
            sleep 2
          done
          echo "❌ Backend server failed to respond with HTTP 200"
          exit 1

      - name: Run API Verification Integration Tests
        env:
          TEST_HOST: 127.0.0.1
          TEST_PORT: 5000
        run: node test-endpoints.js

      - name: Run 100 VU Baseline Load Test (1 Minute)
        env:
          TEST_HOST: 127.0.0.1
          TEST_PORT: 5000
        run: node load-test.js

      - name: Upload Test Logs & Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: |
            load-test.js
            test-endpoints.js
